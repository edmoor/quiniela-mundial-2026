<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1" />
  <meta name="theme-color" content="#06080c" />
  <title>Quiniela · Mundial 2026</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%E2%9A%BD%3C/text%3E%3C/svg%3E" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css?v=__V__" />
</head>
<body>
  <!-- Fondo: malla de luces que respira -->
  <div class="bg" aria-hidden="true">
    <span class="orb o1"></span>
    <span class="orb o2"></span>
    <span class="orb o3"></span>
    <span class="grid"></span>
  </div>
  <div class="grain" aria-hidden="true"></div>
  <canvas id="fx" aria-hidden="true"></canvas>

  <header class="topbar">
    <div class="topbar-inner">
      <div class="brand">
        <span class="ball">⚽</span>
        <div class="brand-txt">
          <h1 id="appTitle">Quiniela</h1>
          <span class="brand-sub">Mundial 2026</span>
        </div>
      </div>
      <div class="topbar-right">
        <button id="meChip" class="chip" hidden></button>
        <button id="adminBtn" class="icon-btn" title="Administrador" aria-label="Administrador">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
        </button>
      </div>
    </div>
  </header>

  <main id="view"><!-- render dinámico --></main>

  <nav class="tabbar">
    <span class="tab-ind" aria-hidden="true"></span>
    <button class="tab is-active" data-tab="partidos"><span class="ti">⚽</span><span>Partidos</span></button>
    <button class="tab" data-tab="tabla"><span class="ti">🏆</span><span>Tabla</span></button>
    <button class="tab" data-tab="final"><span class="ti">🎲</span><span>Final</span></button>
    <button class="tab" data-tab="yo"><span class="ti">🙋</span><span>Yo</span></button>
  </nav>

  <div id="modalRoot"></div>

  <script src="app.js?v=__V__"></script>
</body>
</html>
